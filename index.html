<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С днём рождения, Света!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ff6f91;
    --coral:#ff9770;
    --lavender:#a29bfe;
    --teal:#5fd0c9;
    --gold:#ffd166;
    --cream:#fff6ef;
    --deep:#3a2145;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
  }

  body{
    font-family:'Fredoka', sans-serif;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.25), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(255,255,255,0.18), transparent 45%),
      linear-gradient(160deg, var(--pink) 0%, var(--coral) 45%, var(--lavender) 100%);
    min-height:100svh;
    overflow-x:hidden;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:5vh 4vw;
  }

  /* ===== confetti ===== */
  .confetti{
    position:fixed;
    top:-5vh;
    width:9px; height:14px;
    opacity:0.9;
    border-radius:2px;
    animation:fall linear infinite;
    z-index:1;
  }
  @keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:0.9; }
    100%{ transform:translateY(110vh) rotate(360deg); opacity:0.7; }
  }

  /* ===== balloons ===== */
  .balloon{
    position:absolute;
    bottom:-30vh;
    width:70px; height:88px;
    border-radius:50% 50% 50% 50% / 58% 58% 42% 42%;
    animation:rise linear infinite;
    z-index:2;
    box-shadow: inset -10px -12px 0 rgba(0,0,0,0.06), inset 8px 10px 18px rgba(255,255,255,0.35);
  }
  .balloon::after{
    content:'';
    position:absolute;
    bottom:-70px;
    left:50%;
    width:1px;
    height:70px;
    background:rgba(255,255,255,0.5);
  }
  .balloon::before{
    content:'';
    position:absolute;
    bottom:-9px;
    left:50%;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:6px solid transparent;
    border-right:6px solid transparent;
    border-top:9px solid inherit;
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(-4deg); }
    50%{ transform:translateY(-70vh) translateX(20px) rotate(4deg); }
    100%{ transform:translateY(-135vh) translateX(-10px) rotate(-4deg); }
  }

  /* ===== card ===== */
  .card{
    position:relative;
    z-index:3;
    background:var(--cream);
    border-radius:28px;
    max-width:480px;
    width:100%;
    padding:3.2rem 2.4rem 2.6rem;
    text-align:center;
    box-shadow:
      0 30px 60px rgba(58,33,69,0.35),
      0 8px 20px rgba(58,33,69,0.2);
    transform:rotate(-1deg);
    animation:settle 0.9s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes settle{
    0%{ opacity:0; transform:rotate(-1deg) translateY(40px) scale(0.92); }
    100%{ opacity:1; transform:rotate(-1deg) translateY(0) scale(1); }
  }

  .heart-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:0.6rem;
  }

  .heart{
    width:64px; height:64px;
    position:relative;
    animation:beat 1.6s ease-in-out infinite;
    filter:drop-shadow(0 6px 14px rgba(255,111,145,0.55));
  }
  .heart svg{ width:100%; height:100%; }
  @keyframes beat{
    0%,100%{ transform:scale(1); }
    15%{ transform:scale(1.15); }
    30%{ transform:scale(0.98); }
    45%{ transform:scale(1.08); }
    60%{ transform:scale(1); }
  }

  .eyebrow{
    font-size:0.8rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--pink);
    font-weight:600;
    margin-top:0.8rem;
  }

  h1{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:clamp(2.6rem, 9vw, 3.6rem);
    color:var(--deep);
    line-height:1;
    margin-top:0.3rem;
  }

  .name{
    color:var(--pink);
  }

  p.msg{
    margin-top:1.4rem;
    font-size:1.02rem;
    line-height:1.65;
    color:#5a4864;
    font-weight:400;
  }

  .divider{
    width:60px;
    height:3px;
    border-radius:3px;
    background:linear-gradient(90deg, var(--pink), var(--gold));
    margin:1.6rem auto;
  }

  .signature{
    font-family:'Caveat', cursive;
    font-size:1.7rem;
    font-weight:600;
    color:var(--lavender);
  }

  @media (max-width:480px){
    .card{ padding:2.6rem 1.6rem 2.2rem; border-radius:22px; }
    .balloon{ width:52px; height:66px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>
<body>

<div id="confettiLayer"></div>
<div id="balloonLayer"></div>

<div class="card">
  <div class="heart-wrap">
    <div class="heart">
      <svg viewBox="0 0 32 29" fill="none">
        <path d="M16 28.5C16 28.5 0.5 19.5 0.5 9.8C0.5 4.6 4.6 0.5 9.7 0.5C12.6 0.5 15.1 1.9 16 4.2C16.9 1.9 19.4 0.5 22.3 0.5C27.4 0.5 31.5 4.6 31.5 9.8C31.5 19.5 16 28.5 16 28.5Z" fill="#ff6f91"/>
      </svg>
    </div>
  </div>
  <div class="eyebrow">с днём рождения</div>
  <h1>Моя дорогая<br><span class="name">Мама</span> 🎈</h1>
  <p class="msg">Пусть этот день будет таким же ярким, как воздушные шары за окном,
    а год впереди — таким же тёплым, как твоя улыбка. Я тебя очень любим!</p>
  <div class="divider"></div>
  <div class="signature">С любовью, твой сын Илья 💛</div>
</div>

<script>
  // confetti
  const confettiColors = ['#ff6f91','#ffd166','#5fd0c9','#a29bfe','#ff9770'];
  const confettiLayer = document.getElementById('confettiLayer');
  const confettiCount = window.innerWidth < 600 ? 24 : 45;
  for(let i=0;i<confettiCount;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = confettiColors[Math.floor(Math.random()*confettiColors.length)];
    c.style.animationDuration = (5 + Math.random()*6) + 's';
    c.style.animationDelay = (Math.random()*8) + 's';
    c.style.width = (6 + Math.random()*6) + 'px';
    c.style.height = (10 + Math.random()*8) + 'px';
    confettiLayer.appendChild(c);
  }

  // balloons
  const balloonColors = ['#ff6f91','#ffd166','#5fd0c9','#a29bfe','#ff9770'];
  const balloonLayer = document.getElementById('balloonLayer');
  const balloonCount = window.innerWidth < 600 ? 5 : 8;
  for(let i=0;i<balloonCount;i++){
    const b = document.createElement('div');
    b.className = 'balloon';
    const color = balloonColors[i % balloonColors.length];
    b.style.background = color;
    b.style.borderTopColor = color;
    b.style.left = (Math.random()*90) + 'vw';
    b.style.animationDuration = (14 + Math.random()*10) + 's';
    b.style.animationDelay = (Math.random()*12) + 's';
    balloonLayer.appendChild(b);
  }
</script>

</body>
</html>
